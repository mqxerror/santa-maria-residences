<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"></noscript>
    <meta name="description" content="Santa Maria Residences — premium apartments in Panama City. Explore 200+ luxury units across 44 floors with rooftop pool, gym, and panoramic views. Starting from $265K." />
    <link rel="preload" as="image" href="/assets/renders/perspective.webp" fetchpriority="high" media="(min-width: 769px)">
    <link rel="preload" as="image" href="/assets/renders/perspective-mobile.webp" fetchpriority="high" media="(max-width: 768px)">
    <title>Santa Maria Residences - Premium Apartments in Panama City</title>
  </head>
  <body>
    <a href="#main-content" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0" onfocus="this.style.cssText='position:fixed;top:1rem;left:1rem;z-index:9999;padding:0.5rem 1rem;background:#1e3a5f;color:white;border-radius:0.5rem;font-size:0.875rem;font-weight:500;text-decoration:none;outline:2px solid #1e3a5f;outline-offset:2px'" onblur="this.style.cssText='position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0'">
      Skip to main content
    </a>
    <!-- Static hero shell OUTSIDE React root — provides instant LCP, never replaced by React -->
    <div id="hero-shell" style="position:fixed;top:0;left:0;right:0;height:85vh;min-height:500px;z-index:0;overflow:hidden">
      <picture>
        <source media="(max-width: 768px)" srcset="/assets/renders/perspective-mobile.webp" />
        <img src="/assets/renders/perspective.webp" alt="Santa Maria Residences" width="1920" height="1080" fetchpriority="high" style="width:100%;height:100%;object-fit:cover;object-position:center 25%" />
      </picture>
      <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.85),rgba(0,0,0,0.5),rgba(0,0,0,0.2))"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent,rgba(0,0,0,0.3))"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:40%;display:flex;align-items:center;padding:0 24px">
        <div style="max-width:1280px;margin:0 auto;width:100%">
          <p style="color:#d4af37;font-size:0.75rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem">Premium Residences in Panama City</p>
          <h1 style="font-family:'Inter',system-ui,sans-serif;color:#fff;font-size:2.25rem;font-weight:700;line-height:1.2;margin:0">Santa Maria Residences</h1>
        </div>
      </div>
    </div>
    <div id="root" style="position:relative;z-index:1"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
